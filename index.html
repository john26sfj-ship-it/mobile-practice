<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mobile to desktop responsive mockup</title>
    <link rel="stylesheet" href="style.css" />
    <script type="module" src="app.js"></script>
  </head>
  <body>
    <header>
      <img
        class="panorama"
        src="./components/images/panorama-original-1920.webp"
        alt="panorama picture of a mountain"
      />
    </header>
    <main>
      <section class="hero">
        <h1>We practice!</h1>
        <img
          class="john-avatar"
          src="./components/images/john-avatar.webp"
          alt="A bad picture of Johns face"
        />
        <h2>Practicing since 2026</h2>
        <p>
          This old guy started his journey as a full-stack web-dev in early
          2026, at the Kodehode academy.
        </p>
        <p>
          Since then, he has been sloooowly but surely improving his coding
          skills, and is hoping for an internship in his field around
          august/september
        </p>
        <div class="buttons">
          <button class="btn" id="personalia-btn">About him</button>
          <button class="btn" id="portfolio-btn">His porfolio</button>
        </div>
      </section>
    </main>
  </body>
</html>
